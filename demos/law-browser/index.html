<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>starscapes · law browser</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    #view { width: 100%; height: 100%; display: block; cursor: grab; }
    #view:active { cursor: grabbing; }
    #hud {
      position: fixed; left: 12px; bottom: 10px;
      font: 12px/1.4 ui-monospace, monospace; color: #333;
      background: rgba(255, 255, 255, 0.85); padding: 4px 8px; border-radius: 4px;
      pointer-events: none;
    }
    #panel {
      position: fixed; right: 12px; top: 10px;
      font: 12px/1.6 ui-monospace, monospace; color: #333;
      background: rgba(255, 255, 255, 0.85); padding: 8px 10px; border-radius: 4px;
    }
    #panel label { display: block; }
    #panel input { vertical-align: middle; width: 140px; }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="panel">
    <label>γ <input id="gamma" type="range" min="0" max="2" step="0.05" value="1" /> <span id="gammaOut">1.00</span></label>
    <label>δ <input id="delta" type="range" min="0" max="2" step="0.05" value="1" /> <span id="deltaOut">1.00</span></label>
    <label>c <input id="c" type="range" min="0.005" max="0.1" step="0.005" value="0.035" /> <span id="cOut">0.035</span></label>
  </div>
  <div id="hud"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
