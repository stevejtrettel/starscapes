<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>starscapes explorer</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    #view { width: 100%; height: 100%; display: block; cursor: grab; }
    #view:active { cursor: grabbing; }
    #hud {
      position: fixed; left: 12px; bottom: 10px;
      font: 12px/1.4 ui-monospace, monospace; color: #333;
      background: rgba(255, 255, 255, 0.85); padding: 4px 8px; border-radius: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="hud"></div>
  <script type="module" src="/src/live/main.ts"></script>
</body>
</html>
